{% load static %}
<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}MongiKazi Helpers{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    window.tailwind = window.tailwind || {};
    window.tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            mk: {
              primary: '#0F766E',
              primaryDark: '#0B4F4A',
              secondary: '#F4EFE7',
              accent: '#D9A441',
              bg: '#FAFAF7',
              surface: '#FFFFFF',
              text: '#1F2933',
              muted: '#6B7280',
              border: '#E5E7EB'
            }
          },
          fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'] }
        }
      }
    }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="{% static 'helpers/css/helpers.css' %}">
</head>
<body class="min-h-screen bg-mk-bg text-mk-text font-sans antialiased dark:bg-slate-950 dark:text-slate-100">
  <div class="mk-page-shell"></div>

  <main class="relative mx-auto max-w-7xl px-4 py-5 sm:px-6 lg:px-8 lg:py-8">
    <header class="mk-topbar">
      <a href="{% url 'helpers:profile_detail' %}" class="flex min-w-0 items-center gap-3">
        <span class="mk-brand" aria-hidden="true">MK</span>
        <span class="min-w-0">
          <strong class="block truncate text-base font-bold tracking-tight text-slate-950 dark:text-white">MongiKazi Work Profile</strong>
          <span class="block truncate text-xs font-semibold text-mk-muted dark:text-slate-400">Build a trusted digital CV employers can rely on</span>
        </span>
      </a>
      <div class="flex items-center gap-2">
        <a href="{% url 'helpers:profile_preview' %}" class="hidden rounded-full border border-mk-border bg-white px-3 py-2 text-xs font-bold text-mk-primary shadow-sm transition hover:bg-mk-secondary dark:border-slate-700 dark:bg-slate-900 dark:text-teal-300 dark:hover:bg-slate-800 sm:inline-flex">Preview</a>
        <button type="button" data-theme-toggle class="mk-icon-button" aria-label="Toggle dark mode">◐</button>
      </div>
    </header>

    {% if messages %}
      <div class="mb-4 grid gap-2">
        {% for message in messages %}
          <div class="rounded-2xl border border-amber-200 bg-amber-50 px-4 py-3 text-sm font-semibold text-amber-800 dark:border-amber-800/70 dark:bg-amber-950/30 dark:text-amber-100">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}

    <section class="mk-card overflow-hidden">
      {% block content %}{% endblock %}
    </section>
  </main>
  <script src="{% static 'helpers/js/helpers.js' %}"></script>
</body>
</html>
