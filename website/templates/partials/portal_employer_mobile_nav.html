<nav class="mk-bottom-nav mk-mobile-nav lg:hidden" aria-label="Mobile navigation">
  <a class="mk-mobile-link {% if nav_active == 'dashboard' %}is-active{% endif %}" href="{% url 'employer_portal:dashboard' %}">Home</a>
  <a class="mk-mobile-link {% if nav_active == 'find_help' %}is-active{% endif %}" href="{% url 'employer_portal:find_help' %}">Find</a>
  <a class="mk-mobile-link {% if nav_active == 'bookings' %}is-active{% endif %}" href="{% url 'employer_portal:bookings' %}">Bookings</a>
  <a class="mk-mobile-link {% if nav_active == 'profile' %}is-active{% endif %}" href="{{ employer_profile_url }}">Profile</a>
  <button type="button" class="mk-mobile-link" data-portal-more-open aria-expanded="false" aria-label="More navigation">More</button>
</nav>

<div data-portal-more-menu class="mk-portal-more-menu" hidden aria-hidden="true">
  <div class="mk-portal-more-menu__panel">
    <div class="mb-3 flex items-center justify-between">
      <p class="text-sm font-bold text-mk-text">More</p>
      <button type="button" data-portal-more-close class="mk-icon-button" aria-label="Close menu">&#10005;</button>
    </div>
    <div class="grid gap-1">
      <a href="{% url 'employer_portal:messages' %}" class="mk-nav-link">Messages</a>
      <a href="{% url 'employer_portal:favourites' %}" class="mk-nav-link">Favourites</a>
      <a href="{% url 'employer_portal:payments' %}" class="mk-nav-link">Payments</a>
      <a href="{% url 'employer_portal:support' %}" class="mk-nav-link">Support</a>
      <a href="{% url 'bookings:employer_bookings' %}" class="mk-nav-link">Booking requests</a>
      {% if portal_section == 'employer' and profile_nav_active %}
        <p class="mk-nav-subgroup-label">Profile setup</p>
        <a href="{% url 'employers:profile_detail' %}" class="mk-nav-link">Overview</a>
        <a href="{% url 'employers:profile_edit' %}" class="mk-nav-link">Edit profile</a>
        <a href="{% url 'employers:locations' %}" class="mk-nav-link">Locations</a>
        <a href="{% url 'employers:preferences' %}" class="mk-nav-link">Preferences</a>
        <a href="{% url 'employers:profile_preview' %}" class="mk-nav-link">Preview</a>
      {% else %}
        <a href="{{ employer_profile_url }}" class="mk-nav-link">Profile setup</a>
      {% endif %}
    </div>
  </div>
</div>
