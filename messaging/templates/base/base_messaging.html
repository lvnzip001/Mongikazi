{% load static %}
<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}MongiKazi Messages{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    window.tailwind = window.tailwind || {};
    window.tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            mk: {
              primary: '#0F766E', primaryDark: '#0B4F4A', secondary: '#F4EFE7', accent: '#D9A441',
              bg: '#FAFAF7', surface: '#FFFFFF', text: '#1F2933', muted: '#6B7280', border: '#E5E7EB'
            }
          },
          fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'] }
        }
      }
    }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="{% static 'messaging/css/messaging.css' %}">
</head>
<body class="mk-body min-h-screen bg-mk-bg text-mk-text font-sans antialiased dark:bg-slate-950 dark:text-slate-100">
  <main class="mx-auto w-full max-w-[1400px] px-4 py-5 sm:px-6 lg:px-8 lg:py-8">
    <header class="mk-topbar">
      <a href="{% url 'messaging:inbox' %}" class="flex min-w-0 items-center gap-3">
        <span class="mk-brand">MK</span>
        <span class="min-w-0">
          <strong class="block truncate text-sm font-bold text-slate-950 dark:text-white">MongiKazi Messaging</strong>
          <span class="block truncate text-xs font-semibold text-mk-muted dark:text-slate-400">Secure chat between employer and helper</span>
        </span>
      </a>
      <div class="flex items-center gap-2">
        <a href="{{ dashboard_url }}" class="mk-top-link hidden sm:inline-flex">Dashboard</a>
        <a href="{{ bookings_url }}" class="mk-top-link hidden sm:inline-flex">Bookings</a>
        <button type="button" data-theme-toggle class="mk-icon-button" aria-label="Toggle dark mode" aria-pressed="false">?</button>
      </div>
    </header>

    {% if messages %}
      <div class="mb-4 grid gap-2" aria-live="polite">
        {% for message in messages %}
          <div class="mk-alert {% if message.tags %}mk-alert-{{ message.tags }}{% endif %}">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}

    {% block content %}{% endblock %}
  </main>

  <script src="{% static 'messaging/js/messaging.js' %}"></script>
</body>
</html>
