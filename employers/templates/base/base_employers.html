{% load static %}
<!DOCTYPE html>
<html lang="en" class="scroll-smooth" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}MongiKazi Employers{% endblock %}</title>
  {% include "partials/mk_head.html" %}
  <link rel="stylesheet" href="{% static 'website/css/mk-portal.css' %}">
  <link rel="stylesheet" href="{% static 'website/css/public_app.css' %}">
  <link rel="stylesheet" href="{% static 'employers/css/employers.css' %}">
</head>
<body class="mk-body min-h-screen bg-mk-bg text-mk-text font-sans antialiased">
  <main class="mk-page-wrap relative">
    <header class="mk-topbar mk-mobile-header" aria-label="Employer profile navigation">
      <a href="{% url 'employers:profile_detail' %}" class="flex min-w-0 items-center gap-3">
        <span class="mk-brand" aria-hidden="true">MK</span>
        <span class="min-w-0">
          <strong class="block truncate text-base font-extrabold text-mk-text">Employer profile</strong>
          <span class="block truncate text-xs font-semibold text-mk-muted">Ready for trusted bookings</span>
        </span>
      </a>
      <div class="flex items-center gap-2">
        <a href="{% url 'employers:profile_preview' %}" class="mk-top-link hidden sm:inline-flex">Preview</a>
        <a href="{% url 'employers:profile_detail' %}" class="mk-top-link hidden md:inline-flex">Profile</a>
        <button type="button" data-theme-toggle class="mk-icon-button" aria-label="Toggle dark mode" aria-pressed="false">&#9680;</button>
      </div>
    </header>

    {% if messages %}
      <div class="mb-4 grid gap-2" aria-live="polite">
        {% for message in messages %}
          <div class="mk-alert">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}

    <section class="mk-card overflow-hidden">
      {% block content %}{% endblock %}
    </section>
  </main>
  <script src="{% static 'website/js/mk-theme.js' %}"></script>
  <script src="{% static 'employers/js/employers.js' %}"></script>
</body>
</html>
